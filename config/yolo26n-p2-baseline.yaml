seed: 0
experiment:
  id: yolo26n-p2-baseline

model: yolo26n-p2.yaml
pretrained_weights: /home/zy/repos/sugarbeet-weed-detection/models/yolo26n.pt

data:
  path: data/PhenoBench
  train: images/train
  val: images/val
  names:
    0: sugarbeet
    1: weed

train:
  epochs: 100
  workers: 8
  batch: 4
  imgsz: 1024
  device: "0"
  patience: 100
  optimizer: auto
  # Loss weights (defaults)
  box: 7.5
  cls: 0.5
  dfl: 1.5   # L1 box loss (legacy name; DFL removed in YOLO26)

val:
  imgsz: 1024
  device: "0"

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  close_mosaic: 10
  mixup: 0.0
  cutmix: 0.0
  copy_paste: 0.0
  copy_paste_mode: flip
  bgr: 0.0
  auto_augment: randaugment
  erasing: 0.4

wandb:
  project: sugarbeet-weed-detection
